<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .PageTitle}}{{.PageTitle}} - {{end}}{{index .Settings "title"}}</title>
    {{if .PageDescription}}<meta name="description" content="{{.PageDescription}}">{{end}}
    <meta property="og:site_name" content="{{index .Settings "title"}}">
    <meta property="og:title" content="{{if .PageTitle}}{{.PageTitle}}{{else}}{{index .Settings "title"}}{{end}}">
    {{if .PageDescription}}<meta property="og:description" content="{{.PageDescription}}">{{end}}
    {{if .OGImageURL}}<meta property="og:image" content="{{.OGImageURL}}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{{.OGImageURL}}">{{else}}<meta name="twitter:card" content="summary">{{end}}
    <link rel="stylesheet" href="/static/style.css">
    <style>{{chromaCSS (index .Settings "code_theme")}}</style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/" style="color: var(--fg);">{{index .Settings "title"}}</a></h1>
            {{with index .Settings "description"}}<p>{{.}}</p>{{end}}
            <nav>
                <a href="/">Home</a>
                <a href="/search">Search</a>
            </nav>
        </header>
