<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .PageTitle}}{{.PageTitle}} - {{end}}{{index .Settings "title"}}</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>{{chromaCSS (index .Settings "code_theme")}}</style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/" style="color: var(--fg);">{{index .Settings "title"}}</a></h1>
            {{with index .Settings "description"}}<p>{{.}}</p>{{end}}
            <nav>
                <a href="/">Home</a>
                <a href="/search">Search</a>
            </nav>
        </header>
