<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .PageTitle}}{{.PageTitle}} - {{end}}{{index .Settings "title"}}</title>
    {{if .PageDescription}}<meta name="description" content="{{.PageDescription}}">{{end}}
    <meta property="og:site_name" content="{{index .Settings "title"}}">
    <meta property="og:title" content="{{if .PageTitle}}{{.PageTitle}}{{else}}{{index .Settings "title"}}{{end}}">
    {{if .PageDescription}}<meta property="og:description" content="{{.PageDescription}}">{{end}}
    {{if .OGImageURL}}<meta property="og:image" content="{{.OGImageURL}}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{{.OGImageURL}}">{{else}}<meta name="twitter:card" content="summary">{{end}}
    <link rel="stylesheet" href="/static/style.css">
    <style>{{chromaCSS (index .Settings "code_theme")}}</style>
</head>
<body>
    <div class="container">
        <header>
            <div class="site-title-row">
                <h1><a href="/" style="color: var(--fg);">{{index .Settings "title"}}</a></h1>
                <button type="button" class="search-trigger" aria-label="Search" aria-haspopup="dialog" aria-controls="search-modal">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
            </div>
            {{with index .Settings "description"}}<p>{{.}}</p>{{end}}
        </header>
