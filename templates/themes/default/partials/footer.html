        <footer style="margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.85rem;">
            <p>Powered by <a href="https://writekit.dev">WriteKit</a></p>
        </footer>
    </div>
    <script>
    (function() {
        // YouTube: click play → replace with iframe
        document.querySelectorAll('.embed-youtube .embed-play').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var container = btn.closest('.embed-youtube');
                var id = container.dataset.id;
                container.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>';
            });
        });

        // Gist: load script
        document.querySelectorAll('.embed-gist').forEach(function(el) {
            var url = el.dataset.url;
            if (!url) return;
            var id = url.split('/').pop();
            var cb = 'gist_cb_' + id.replace(/[^a-zA-Z0-9]/g, '');
            window[cb] = function(data) {
                el.innerHTML = data.div;
                if (data.stylesheet && !document.querySelector('link[href="' + data.stylesheet + '"]')) {
                    var link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = data.stylesheet;
                    document.head.appendChild(link);
                }
            };
            var s = document.createElement('script');
            s.src = url + '.json?callback=' + cb;
            document.body.appendChild(s);
        });

        // Twitter: load widgets.js
        if (document.querySelector('.embed-twitter')) {
            var s = document.createElement('script');
            s.src = 'https://platform.twitter.com/widgets.js';
            s.async = true;
            document.body.appendChild(s);
        }

        // Code block copy buttons
        document.querySelectorAll('.code-copy').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var code = btn.closest('.code-block').querySelector('code').textContent;
                navigator.clipboard.writeText(code).then(function() {
                    var toast = btn.querySelector('.toast');
                    if (toast) {
                        toast.classList.add('show');
                        setTimeout(function() { toast.classList.remove('show'); }, 1500);
                    }
                });
            });
        });

        // D2 zoom/pan/fullscreen controls
        document.querySelectorAll('.d2-diagram').forEach(function(diagram) {
            var viewport = diagram.querySelector('.d2-viewport');
            if (!viewport) return;
            var svg = viewport.querySelector(':scope > svg');
            if (!svg) return;

            var scale = 1, panX = 0, panY = 0, dragging = false, startX, startY;
            var vb = svg.viewBox.baseVal;
            var naturalW = vb.width || svg.getAttribute('width') || 600;
            var naturalH = vb.height || svg.getAttribute('height') || 400;
            var origWidth = svg.getAttribute('width');
            var origHeight = svg.getAttribute('height');

            function centerSvg() {
                var vw = viewport.clientWidth, vh = viewport.clientHeight;
                panX = (vw - naturalW * scale) / 2;
                panY = (vh - naturalH * scale) / 2;
            }
            function applyTransform() {
                svg.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
                svg.style.transformOrigin = '0 0';
            }
            function resetView() { scale = 1; panX = 0; panY = 0; svg.style.transform = ''; svg.style.transformOrigin = ''; }
            function restoreDimensions() {
                if (origWidth) svg.setAttribute('width', origWidth); else svg.removeAttribute('width');
                if (origHeight) svg.setAttribute('height', origHeight); else svg.removeAttribute('height');
            }

            var zoomIn = diagram.querySelector('.d2-zoom-in');
            var zoomOut = diagram.querySelector('.d2-zoom-out');
            var reset = diagram.querySelector('.d2-reset');
            var fs = diagram.querySelector('.d2-fullscreen');

            function zoomTo(newScale) {
                var vw = viewport.clientWidth, vh = viewport.clientHeight, prev = scale;
                scale = newScale;
                var r = scale / prev;
                panX = vw / 2 - r * (vw / 2 - panX); panY = vh / 2 - r * (vh / 2 - panY);
                applyTransform();
            }

            if (zoomIn) zoomIn.addEventListener('click', function() { zoomTo(Math.min(scale * 1.25, 5)); });
            if (zoomOut) zoomOut.addEventListener('click', function() { zoomTo(Math.max(scale / 1.25, 0.1)); });
            if (reset) reset.addEventListener('click', resetView);

            if (fs) fs.addEventListener('click', function() {
                var isFs = diagram.classList.toggle('fullscreen');
                if (isFs) {
                    svg.setAttribute('width', naturalW); svg.setAttribute('height', naturalH);
                    scale = 1;
                    requestAnimationFrame(function() { centerSvg(); applyTransform(); });
                } else { restoreDimensions(); resetView(); }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && diagram.classList.contains('fullscreen')) {
                    diagram.classList.remove('fullscreen'); restoreDimensions(); resetView();
                }
            });

            viewport.addEventListener('mousedown', function(e) {
                dragging = true; startX = e.clientX - panX; startY = e.clientY - panY;
                viewport.classList.add('dragging');
            });
            document.addEventListener('mousemove', function(e) {
                if (!dragging) return;
                panX = e.clientX - startX; panY = e.clientY - startY;
                applyTransform();
            });
            document.addEventListener('mouseup', function() { dragging = false; viewport.classList.remove('dragging'); });

            viewport.addEventListener('wheel', function(e) {
                e.preventDefault();
                var rect = viewport.getBoundingClientRect();
                var mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
                var prev = scale, factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
                scale = Math.min(Math.max(scale * factor, 0.1), 5);
                var r = scale / prev;
                panX = mouseX - r * (mouseX - panX); panY = mouseY - r * (mouseY - panY);
                applyTransform();
            }, { passive: false });
        });
    })();
    </script>
</body>
</html>
