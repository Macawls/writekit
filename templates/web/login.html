<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — WriteKit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#fafafa;--white:#fff;--fg:#0f0f0f;--fg2:#3f3f46;
            --muted:#71717a;--faint:#a1a1aa;--border:#e4e4e7;--border2:#d4d4d8;
            --accent:#2563eb;--surface:#18181b;
            --sans:'Instrument Sans',system-ui,sans-serif;
            --mono:'JetBrains Mono',ui-monospace,monospace;
        }
        body{
            font-family:var(--sans);background:var(--bg);color:var(--fg);
            -webkit-font-smoothing:antialiased;line-height:1.6;
            min-height:100vh;display:flex;flex-direction:column;
            align-items:center;justify-content:center;padding:2rem;
        }

        /* Subtle dot grid background */
        body::before{
            content:'';position:fixed;inset:0;z-index:0;
            background-image:radial-gradient(circle,var(--border2) .5px,transparent .5px);
            background-size:24px 24px;
            opacity:.5;
        }

        .login-container{
            position:relative;z-index:1;
            width:100%;max-width:380px;
        }

        .brand{
            text-align:center;margin-bottom:2.5rem;
            animation:fadeUp .5s cubic-bezier(.19,1,.22,1) both;
        }
        .brand-mark{
            font-family:var(--mono);font-weight:500;font-size:1.1rem;
            letter-spacing:-.04em;color:var(--fg);
        }
        .brand-tagline{
            margin-top:.35rem;font-size:.8rem;color:var(--faint);
            letter-spacing:.01em;
        }

        .card{
            background:var(--white);
            border:1px solid var(--border);
            border-radius:16px;
            padding:2rem;
            box-shadow:
                0 1px 2px rgba(0,0,0,.04),
                0 4px 16px rgba(0,0,0,.04);
            animation:fadeUp .5s cubic-bezier(.19,1,.22,1) .08s both;
        }

        .card-title{
            font-size:.95rem;font-weight:600;color:var(--fg);
            text-align:center;margin-bottom:1.5rem;letter-spacing:-.01em;
        }

        .providers{display:flex;flex-direction:column;gap:.65rem}

        .provider-btn{
            display:flex;align-items:center;gap:.75rem;
            width:100%;padding:.7rem 1rem;
            background:var(--white);
            border:1.5px solid var(--border);
            border-radius:10px;
            font-family:var(--sans);font-size:.85rem;font-weight:500;
            color:var(--fg);
            text-decoration:none;
            transition:all .2s cubic-bezier(.19,1,.22,1);
            cursor:pointer;
            position:relative;
            overflow:hidden;
        }
        .provider-btn:hover{
            border-color:var(--border2);
            background:#f4f4f5;
            transform:translateY(-1px);
            box-shadow:0 2px 8px rgba(0,0,0,.06);
        }
        .provider-btn:active{
            transform:translateY(0);
            box-shadow:none;
        }
        .provider-btn svg{
            width:18px;height:18px;flex-shrink:0;
        }

        /* Provider-specific hover accents */
        .provider-btn.github:hover{border-color:#333}
        .provider-btn.google:hover{border-color:#4285f4}
        .provider-btn.discord:hover{border-color:#5865f2}

        .divider{
            display:flex;align-items:center;gap:.75rem;
            margin:1.25rem 0;color:var(--faint);font-size:.7rem;
            letter-spacing:.06em;text-transform:uppercase;
            font-family:var(--mono);font-weight:500;
        }
        .divider::before,.divider::after{
            content:'';flex:1;height:1px;background:var(--border);
        }

        .footer-text{
            text-align:center;margin-top:1.75rem;
            font-size:.75rem;color:var(--faint);
            animation:fadeUp .5s cubic-bezier(.19,1,.22,1) .16s both;
        }
        .footer-text a{color:var(--muted);text-decoration:none;transition:color .15s}
        .footer-text a:hover{color:var(--fg)}

        @keyframes fadeUp{
            from{opacity:0;transform:translateY(12px)}
            to{opacity:1;transform:translateY(0)}
        }

        @media(max-width:480px){
            body{padding:1.25rem}
            .card{padding:1.5rem;border-radius:14px}
            .brand{margin-bottom:2rem}
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand">
        <div class="brand-mark">writekit</div>
        <div class="brand-tagline">Your blog, managed by conversation.</div>
    </div>

    <div class="card">
        <div class="card-title">Sign in to continue</div>

        <div class="providers">
            {{if .GithubEnabled}}
            <a href="/auth/login/github{{if .OAuth}}?oauth=1&{{.OAuthParams}}{{end}}" class="provider-btn github">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
                Continue with GitHub
            </a>
            {{end}}

            {{if .GoogleEnabled}}
            <a href="/auth/login/google{{if .OAuth}}?oauth=1&{{.OAuthParams}}{{end}}" class="provider-btn google">
                <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Continue with Google
            </a>
            {{end}}

            {{if .DiscordEnabled}}
            <a href="/auth/login/discord{{if .OAuth}}?oauth=1&{{.OAuthParams}}{{end}}" class="provider-btn discord">
                <svg viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                Continue with Discord
            </a>
            {{end}}
        </div>
    </div>

    <div class="footer-text">
        <a href="/">← Back to WriteKit</a>
    </div>
</div>

</body>
</html>
