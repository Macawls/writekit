<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize - WriteKit</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="auth-page">
        <h1>Authorize Access</h1>
        <p style="margin-bottom: 1.5rem;">An application wants to access your WriteKit account.</p>

        <div class="card" style="text-align: left;">
            <p>Signed in as <strong>{{.User.Email}}</strong></p>
            <p style="margin-top: 0.5rem; color: var(--muted);">This will allow the application to manage your blog posts, comments, and settings.</p>
        </div>

        <form method="POST" action="/oauth/authorize" style="margin-top: 1.5rem;">
            <input type="hidden" name="client_id" value="{{.AuthReq.ClientID}}">
            <input type="hidden" name="redirect_uri" value="{{.AuthReq.RedirectURI}}">
            <input type="hidden" name="state" value="{{.AuthReq.State}}">
            <input type="hidden" name="scope" value="{{.AuthReq.Scope}}">
            <input type="hidden" name="code_challenge" value="{{.AuthReq.CodeChallenge}}">
            <input type="hidden" name="code_challenge_method" value="{{.AuthReq.CodeMethod}}">

            <div style="display: flex; gap: 0.75rem; justify-content: center;">
                <button type="submit" name="action" value="approve" class="btn">Approve</button>
                <button type="submit" name="action" value="deny" class="btn btn-outline">Deny</button>
            </div>
        </form>
    </div>
</body>
</html>
