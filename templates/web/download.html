    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#fafafa;--fg:#0f0f0f;--muted:#71717a;--faint:#a1a1aa;
            --border:#e4e4e7;--border2:#d4d4d8;--surface:#18181b;--white:#fff;
            --sans:'Plus Jakarta Sans',system-ui,sans-serif;
            --mono:'JetBrains Mono',ui-monospace,monospace;
        }
        html,body{min-height:100%}
        body{
            font-family:var(--sans);background:var(--bg);color:var(--fg);
            -webkit-font-smoothing:antialiased;
            display:flex;flex-direction:column;min-height:100vh;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background-image:radial-gradient(circle,var(--border) .5px,transparent .5px);
            background-size:24px 24px;opacity:.3;pointer-events:none;z-index:0;
        }
        main{
            flex:1;position:relative;z-index:1;
            max-width:720px;width:100%;margin:0 auto;padding:2.5rem 2rem 4rem;
        }
        .hero{text-align:center;margin-bottom:2.5rem}
        .hero h1{
            font-size:1.8rem;font-weight:700;letter-spacing:-.03em;
            line-height:1.15;margin-bottom:.5rem;
        }
        .hero p{font-size:.92rem;color:var(--muted);line-height:1.5;max-width:460px;margin:0 auto}
        .version{
            margin-top:.9rem;font-size:.72rem;color:var(--faint);
            font-family:var(--mono);letter-spacing:.02em;min-height:1em;
        }
        .version a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border2)}
        .version a:hover{color:var(--fg)}

        .downloads{display:flex;flex-direction:column;gap:.6rem}
        .dl{
            display:flex;align-items:center;gap:1rem;
            padding:1rem 1.1rem;
            background:var(--white);border:1px solid var(--border);border-radius:10px;
            text-decoration:none;color:inherit;
            transition:border-color .15s, box-shadow .15s, transform .05s;
        }
        .dl:hover{border-color:var(--border2);box-shadow:0 1px 2px rgba(0,0,0,.02),0 8px 24px rgba(0,0,0,.04)}
        .dl:active{transform:translateY(1px)}
        .dl.recommended{
            border-color:var(--surface);
            box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);
        }
        .dl-icon{
            width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
            color:var(--fg);
        }
        .dl-body{flex:1;min-width:0}
        .dl-os{font-size:.95rem;font-weight:600;letter-spacing:-.01em;display:flex;align-items:center;gap:.5rem}
        .dl-os .tag{
            font-family:var(--mono);font-size:.55rem;font-weight:500;letter-spacing:.05em;
            color:var(--white);background:var(--surface);
            padding:.15rem .4rem;border-radius:4px;text-transform:uppercase;
        }
        .dl-meta{font-size:.72rem;color:var(--muted);font-family:var(--mono);margin-top:.2rem}
        .dl-arrow{color:var(--faint);flex-shrink:0}
        .dl:hover .dl-arrow{color:var(--fg)}

        .note{
            margin-top:2rem;padding:1rem 1.15rem;font-size:.78rem;color:var(--muted);
            line-height:1.55;background:var(--white);
            border:1px solid var(--border);border-radius:10px;
        }
        .note code{
            font-family:var(--mono);font-size:.72rem;color:var(--fg);
            background:var(--bg);padding:.12rem .35rem;border-radius:4px;
            border:1px solid var(--border);
        }
        .note a{color:var(--fg);text-decoration:underline;text-underline-offset:2px}

        .foot{text-align:center;margin-top:2rem;font-size:.72rem;color:var(--faint)}
        .foot a{color:var(--muted);text-decoration:none;margin:0 .5rem}
        .foot a:hover{color:var(--fg)}

        @media(max-width:600px){
            main{padding:1.5rem 1.25rem 3rem}
            .hero h1{font-size:1.5rem}
            .dl{padding:.85rem .95rem;gap:.75rem}
            .dl-icon{width:30px;height:30px}
        }
    </style>
</head>
<body>

<script>
(function(){
    var ua = navigator.userAgent.toLowerCase();
    var platform = (navigator.platform || '').toLowerCase();
    var os = null;
    if (/mac|iphone|ipad/.test(platform) || /mac os x/.test(ua)) os = 'macos';
    else if (/win/.test(platform) || /windows/.test(ua)) os = 'windows';
    else if (/linux|x11/.test(platform) || /linux/.test(ua)) os = 'linux';

    if (!os) return;
    var container = document.getElementById('downloads');
    var match = container.querySelector('.dl[data-os="' + os + '"]');
    if (match) {
        match.classList.add('recommended');
        container.insertBefore(match, container.firstChild);
        var badge = match.querySelector('[data-badge="' + os + '"]');
        if (badge) badge.style.display = 'inline-block';
    }
})();

(function(){
    var el = document.getElementById('version');
    if (!el) return;
    fetch('https://api.github.com/repos/Macawls/writekit/releases/latest', {headers:{'Accept':'application/vnd.github+json'}})
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(d){
            if (!d || !d.tag_name) return;
            var date = d.published_at ? new Date(d.published_at).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) : '';
            el.innerHTML = 'Latest: <a href="' + (d.html_url || 'https://github.com/Macawls/writekit/releases') + '">' + d.tag_name + '</a>' + (date ? ' · ' + date : '') + ' · <a href="https://github.com/Macawls/writekit/releases">all releases</a>';
        })
        .catch(function(){});
})();
</script>
