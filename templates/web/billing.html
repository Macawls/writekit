<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing - WriteKit</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>WriteKit</h1>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/billing">Billing</a>
            </nav>
        </header>

        <h2>Billing</h2>

        {{if .Subscription}}
        <div class="card" style="margin-top: 1rem;">
            <h3>Creator Plan</h3>
            <p>Status: <strong>{{.Subscription.Status}}</strong></p>
            <form method="POST" action="/billing/portal" style="margin-top: 1rem;">
                <button type="submit" class="btn btn-outline">Manage Subscription</button>
            </form>
        </div>
        {{else}}
        <div class="card" style="margin-top: 1rem;">
            <h3>Creator Plan - $5/mo</h3>
            <p style="color: var(--muted);">Custom domain support for your blog.</p>
            <form method="POST" action="/billing/checkout" style="margin-top: 1rem;">
                <button type="submit" class="btn">Subscribe</button>
            </form>
        </div>
        {{end}}
    </div>
</body>
</html>
