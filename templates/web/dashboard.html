<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - WriteKit</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>WriteKit</h1>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/profile">Profile</a>
                <a href="/billing">Billing</a>
                <form method="POST" action="/auth/logout" style="display:inline">
                    <button type="submit" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.9rem;">Logout</button>
                </form>
            </nav>
        </header>

        <h2>Your Blogs</h2>

        {{if .Tenants}}
        <div style="margin-top: 1rem;">
            {{range .Tenants}}
            <div class="card">
                <h3>{{.Name}}</h3>
                <p style="color: var(--muted); font-size: 0.9rem;">
                    <a href="https://{{.ID}}.{{$.Host}}">{{.ID}}.{{$.Host}}</a>
                </p>
            </div>
            {{end}}
        </div>
        {{else}}
        <p style="color: var(--muted); margin-top: 1rem;">You don't have any blogs yet. Create one below.</p>
        {{end}}

        <div class="card" style="margin-top: 2rem;">
            <h3>Create a new blog</h3>
            <form method="POST" action="/blogs" style="margin-top: 1rem;">
                <div class="form-group">
                    <label for="slug">Subdomain</label>
                    <div style="display:flex;align-items:center;gap:0.25rem;">
                        <input type="text" id="slug" name="slug" placeholder="my-blog" required pattern="[a-z0-9][a-z0-9-]{1,62}[a-z0-9]">
                        <span style="color:var(--muted)">.{{.Host}}</span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="name">Blog name</label>
                    <input type="text" id="name" name="name" placeholder="My Blog">
                </div>
                <button type="submit" class="btn">Create Blog</button>
            </form>
        </div>
    </div>
</body>
</html>
