<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteKit — Publish by conversation</title>
    <meta name="description" content="Pages, collections, and docs managed entirely through your AI assistant. Connect via MCP and publish to your own subdomain.">
    <link rel="canonical" href="https://writekit.dev/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="WriteKit — Publish by conversation">
    <meta property="og:description" content="Pages, collections, and docs managed entirely through your AI assistant. Connect via MCP and publish to your own subdomain.">
    <meta property="og:url" content="https://writekit.dev/">
    <meta property="og:site_name" content="WriteKit">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="WriteKit — Publish by conversation">
    <meta name="twitter:description" content="Pages, collections, and docs managed entirely through your AI assistant.">
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"SoftwareApplication","name":"WriteKit","url":"https://writekit.dev","applicationCategory":"DeveloperApplication","description":"MCP-powered publishing tool. Create and manage pages and collections entirely through conversation with your AI assistant.","operatingSystem":"Web","offers":{"@type":"Offer","price":"5","priceCurrency":"USD"}}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#fafafa;--fg:#0f0f0f;--muted:#71717a;--faint:#a1a1aa;
            --border:#e4e4e7;--border2:#d4d4d8;--surface:#18181b;--white:#fff;
            --sans:'Plus Jakarta Sans',system-ui,sans-serif;
            --mono:'JetBrains Mono',ui-monospace,monospace;
        }
        html,body{height:100%}
        body{
            font-family:var(--sans);background:var(--bg);color:var(--fg);
            -webkit-font-smoothing:antialiased;
            display:flex;flex-direction:column;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background-image:radial-gradient(circle,var(--border) .5px,transparent .5px);
            background-size:24px 24px;opacity:.3;pointer-events:none;
        }


        main{
            flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
            position:relative;z-index:1;padding:0 2rem 8rem;
        }

        .hero{text-align:center;margin-bottom:2.5rem}
        .hero h1{
            font-size:1.5rem;font-weight:700;letter-spacing:-.03em;
            line-height:1.2;margin-bottom:.6rem;color:var(--fg);
        }
        .hero p{font-size:.86rem;color:var(--muted);line-height:1.5;max-width:340px;margin:0 auto}

        .cmd{
            display:flex;align-items:center;justify-content:space-between;gap:.75rem;
            width:100%;max-width:560px;
            font-family:var(--mono);font-size:clamp(.76rem,1.5vw,.85rem);
            font-weight:500;color:var(--fg);letter-spacing:-.01em;
            padding:.85rem 1.15rem;
            background:var(--white);
            border:1px solid var(--border);
            border-radius:10px;
            box-shadow:0 1px 2px rgba(0,0,0,.02),0 4px 16px rgba(0,0,0,.03);
            cursor:pointer;
        }
        .cmd:hover{
            box-shadow:0 1px 2px rgba(0,0,0,.02),0 8px 32px rgba(0,0,0,.06);
            border-color:var(--border2);
        }
        .cmd-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        @media(min-width:601px){.cmd-text{overflow:visible}}
        .cmd-text .d{color:var(--faint);user-select:none;margin-right:.3em}
        .cmd-text .dim{color:var(--muted)}
        .cmd-cp{
            color:var(--faint);background:transparent;border:none;padding:0;
            cursor:pointer;flex-shrink:0;display:flex;align-items:center;
        }
        .cmd-cp:hover{color:var(--muted)}
        .cmd-cp.ok{color:var(--fg)}

        .secondary{
            margin-top:1rem;text-align:center;
        }
        .json-toggle{
            display:inline-flex;align-items:center;gap:.3rem;
            font-family:var(--mono);font-size:.58rem;font-weight:500;
            color:var(--faint);cursor:pointer;background:none;border:none;
        }
        .json-toggle:hover{color:var(--muted)}
        .json-toggle svg{width:6px;height:6px}
        .json-toggle.open svg{transform:rotate(90deg)}
        .json-code{
            display:none;margin-top:.6rem;padding:.75rem 1rem;
            background:var(--white);border:1px solid var(--border);border-radius:8px;
            font-family:var(--mono);font-size:.65rem;line-height:1.6;
            color:var(--muted);white-space:pre;text-align:left;
        }
        .json-code.show{display:block}

        footer{
            position:relative;z-index:1;padding:0 2rem 1.75rem;text-align:center;
        }
        footer a{font-size:.68rem;color:var(--faint);text-decoration:none}
        footer a:hover{color:var(--fg)}

        @media(max-width:600px){
            nav{margin:.75rem .75rem 0;width:auto}
            main{padding:0 1.5rem 5rem}
            .hero h1{font-size:1.3rem}
            .cmd{padding:.75rem 1rem}
        }
    </style>
</head>
<body>

{{template "partials/nav.html" .}}

<main>
    <div class="hero">
        <h1>Publish by conversation</h1>
        <p>Pages, collections, docs — managed entirely through your AI assistant.</p>
    </div>

    <div class="cmd" onclick="copyCmd()">
        <span class="cmd-text"><span class="d">$</span> claude mcp add <span class="dim">--transport http</span> writekit https://writekit.dev/mcp</span>
        <button class="cmd-cp" id="cpBtn" onclick="event.stopPropagation();copyCmd()" aria-label="Copy to clipboard">
            <svg id="cpIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <svg id="cpCheck" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
    </div>

    <div class="secondary">
        <button class="json-toggle" onclick="toggleJson(this)">
            <svg viewBox="0 0 6 10" fill="currentColor"><path d="M1 1l4 4-4 4"/></svg>
            MCP config JSON
        </button>
        <div class="json-code" id="json">{
  "mcpServers": {
    "writekit": {
      "url": "https://writekit.dev/mcp"
    }
  }
}</div>
    </div>
</main>

<footer>
    <a href="/docs">Read the docs</a>
</footer>

<script>
function copyCmd(){
    navigator.clipboard.writeText('claude mcp add --transport http writekit https://writekit.dev/mcp').then(()=>{
        const btn=document.getElementById('cpBtn');
        const icon=document.getElementById('cpIcon');
        const check=document.getElementById('cpCheck');
        icon.style.display='none';check.style.display='block';
        btn.classList.add('ok');
        setTimeout(()=>{icon.style.display='block';check.style.display='none';btn.classList.remove('ok')},2e3)
    })
}
function toggleJson(btn){
    btn.classList.toggle('open');
    document.getElementById('json').classList.toggle('show');
}
</script>
</body>
</html>
