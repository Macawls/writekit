<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteKit — Publish by conversation</title>
    <meta name="description" content="Pages, collections, and docs managed entirely through your AI assistant. Connect via MCP and publish to your own subdomain.">
    <link rel="canonical" href="https://writekit.dev/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="WriteKit — Publish by conversation">
    <meta property="og:description" content="Pages, collections, and docs managed entirely through your AI assistant. Connect via MCP and publish to your own subdomain.">
    <meta property="og:url" content="https://writekit.dev/">
    <meta property="og:site_name" content="WriteKit">
    <meta property="og:image" content="https://writekit.dev/og.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="WriteKit — Publish by conversation">
    <meta name="twitter:description" content="Pages, collections, and docs managed entirely through your AI assistant.">
    <meta name="twitter:image" content="https://writekit.dev/og.png">
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"SoftwareApplication","name":"WriteKit","url":"https://writekit.dev","applicationCategory":"DeveloperApplication","description":"MCP-powered publishing tool. Create and manage pages and collections entirely through conversation with your AI assistant.","operatingSystem":"Web","offers":{"@type":"Offer","price":"5","priceCurrency":"USD"}}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#fafafa;--fg:#0a0a0a;--muted:#52525b;--faint:#a1a1aa;
            --border:#e4e4e7;--border2:#d4d4d8;--surface:#141418;--white:#fff;
            --sans:'Plus Jakarta Sans',system-ui,sans-serif;
            --mono:'JetBrains Mono',ui-monospace,monospace;
        }
        html,body{height:100%;scrollbar-width:none;-ms-overflow-style:none}
        html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0}
        body{
            font-family:var(--sans);color:var(--fg);background:var(--bg);
            -webkit-font-smoothing:antialiased;
            display:flex;flex-direction:column;
            overflow-y:auto;position:relative;
        }
        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(70% 55% at 50% 0%, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0) 60%),
                radial-gradient(50% 40% at 80% 110%, rgba(0,0,0,0.025) 0%, rgba(0,0,0,0) 60%);
        }
        body::after{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:url('/static/grain.svg');
            background-size:400px 400px;background-repeat:repeat;
            opacity:.06;mix-blend-mode:multiply;
        }

        main{
            flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
            position:relative;z-index:1;padding:6rem 2rem 10rem;
        }

        .hero{text-align:center;margin-bottom:4rem;max-width:720px}
        .hero h1{
            font-size:clamp(2.4rem,6vw,4rem);font-weight:700;letter-spacing:-.04em;
            line-height:1.02;margin-bottom:1.35rem;color:var(--fg);
        }
        .hero p{
            font-size:clamp(1rem,1.5vw,1.125rem);color:var(--muted);
            line-height:1.55;max-width:520px;margin:0 auto;font-weight:400;
        }

        .cmd{
            display:inline-flex;align-items:center;justify-content:space-between;gap:.9rem;
            width:max-content;max-width:100%;
            font-family:var(--mono);font-size:clamp(.7rem,1.6vw,.9rem);
            font-weight:500;color:#e4e4e7;letter-spacing:-.01em;
            padding:1.1rem 1.4rem;
            background:#0a0a0a;
            border:1px solid #1c1c1f;
            border-radius:14px;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.04),
                0 4px 12px rgba(0,0,0,.08),
                0 24px 64px rgba(0,0,0,.12);
            cursor:pointer;
        }
        .cmd:hover{
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.06),
                0 8px 20px rgba(0,0,0,.12),
                0 32px 80px rgba(0,0,0,.18);
        }
        .cmd-text{white-space:nowrap;overflow-x:auto;min-width:0;scrollbar-width:none}
        .cmd-text::-webkit-scrollbar{display:none}
        .cmd-text .d{color:#71717a;user-select:none;margin-right:.35em}
        .cmd-text .dim{color:#a1a1aa}
        .cmd-cp{
            color:#71717a;background:transparent;border:none;padding:0;
            cursor:pointer;flex-shrink:0;display:flex;align-items:center;
        }
        .cmd-cp:hover{color:#d4d4d8}
        .cmd-cp.ok{color:#fff}

        footer{
            position:relative;z-index:1;padding:0 2rem 2.5rem;text-align:center;
        }
        footer a{font-size:.72rem;color:var(--muted);text-decoration:none;letter-spacing:.02em}
        footer a:hover{color:var(--fg)}

        @media(max-width:600px){
            main{padding:4rem 1.5rem 6rem}
            .hero{margin-bottom:3rem}
            .cmd{padding:.95rem 1.15rem}
        }
    </style>
</head>
<body>

{{template "partials/nav.html" .}}

<main>
    <div class="hero">
        <h1>Publish by conversation.</h1>
        <p>Pages, collections, docs — managed entirely through your AI assistant. Connect via MCP and publish to your own subdomain.</p>
    </div>

    <div class="cmd" onclick="copyCmd()">
        <span class="cmd-text"><span class="d">$</span> claude mcp add <span class="dim">--transport http</span> writekit https://writekit.dev/mcp</span>
        <button class="cmd-cp" id="cpBtn" onclick="event.stopPropagation();copyCmd()" aria-label="Copy to clipboard">
            <svg id="cpIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <svg id="cpCheck" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
    </div>

</main>

<footer>
    <a href="/docs">Read the docs</a>
</footer>

<script>
function copyCmd(){
    navigator.clipboard.writeText('claude mcp add --transport http writekit https://writekit.dev/mcp').then(()=>{
        const btn=document.getElementById('cpBtn');
        const icon=document.getElementById('cpIcon');
        const check=document.getElementById('cpCheck');
        icon.style.display='none';check.style.display='block';
        btn.classList.add('ok');
        setTimeout(()=>{icon.style.display='block';check.style.display='none';btn.classList.remove('ok')},2e3)
    })
}
</script>
</body>
</html>
