<style>
    .wk-nav{
        position:relative;z-index:10;
        max-width:600px;width:100%;margin:1rem auto 0;padding:.55rem .55rem .55rem .85rem;
        display:flex;justify-content:space-between;align-items:center;
        background:rgba(255,255,255,.6);
        backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
        border:1px solid rgba(228,228,231,.5);
        border-radius:10px;
        box-shadow:0 1px 2px rgba(0,0,0,.02),0 2px 8px rgba(0,0,0,.03);
    }
    .wk-nav .nav-l{display:flex;align-items:center;gap:.45rem}
    .wk-nav .logo{
        font-family:var(--sans,'Plus Jakarta Sans',system-ui,sans-serif);
        font-weight:700;font-size:.85rem;color:var(--fg,#0f0f0f);
        letter-spacing:-.04em;text-decoration:none;
    }
    .wk-nav .badge{
        font-family:var(--mono,'JetBrains Mono',ui-monospace,monospace);
        font-size:.55rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;
        color:var(--muted,#71717a);
        border:1px solid var(--border,#e4e4e7);border-radius:4px;
        padding:.1rem .35rem;line-height:1;
    }
    .wk-nav .version{
        font-family:var(--mono,'JetBrains Mono',ui-monospace,monospace);
        font-size:.58rem;font-weight:500;letter-spacing:.02em;
        color:var(--faint,#a1a1aa);line-height:1;padding:.1rem 0;
    }
    .wk-nav .nav-r{display:flex;gap:.25rem;align-items:center}
    .wk-nav .nav-r a{
        font-size:.78rem;font-weight:500;color:var(--muted,#71717a);
        text-decoration:none;padding:.4rem .7rem;border-radius:7px;line-height:normal;
    }
    .wk-nav .nav-r a:hover{color:var(--fg,#0f0f0f);background:rgba(0,0,0,.04)}
    .wk-nav .nav-r .icon-link{
        padding:.4rem .5rem;display:flex;align-items:center;color:var(--muted,#71717a);
    }
    .wk-nav .nav-r .icon-link:hover{color:var(--fg,#0f0f0f)}
    .wk-nav .nav-r .signin{
        color:var(--white,#fff);background:var(--surface,#18181b);
        padding:.4rem .85rem;
    }
    .wk-nav .nav-r .signin:hover{opacity:.85;background:var(--surface,#18181b);color:var(--white,#fff)}
    .wk-nav .profile{position:relative;display:none}
    .wk-nav .avatar{
        width:28px;height:28px;border-radius:50%;object-fit:cover;cursor:pointer;
        border:1px solid var(--border,#e4e4e7);
    }
    .wk-nav .avatar-fallback{
        width:28px;height:28px;border-radius:50%;cursor:pointer;
        border:1px solid var(--border,#e4e4e7);
        background:var(--surface,#18181b);color:var(--white,#fff);
        display:flex;align-items:center;justify-content:center;
        font-family:var(--sans,'Plus Jakarta Sans',system-ui,sans-serif);
        font-size:.7rem;font-weight:600;line-height:1;
    }
    .wk-nav .dropdown{
        display:none;position:absolute;right:0;top:calc(100% + .45rem);
        background:var(--white,#fff);border:1px solid var(--border,#e4e4e7);
        border-radius:8px;padding:.25rem;min-width:140px;
        box-shadow:0 4px 16px rgba(0,0,0,.08);
    }
    .wk-nav .dropdown.open{display:block}
    .wk-nav .dropdown a,.wk-nav .dropdown button{
        display:block;width:100%;text-align:left;padding:.4rem .65rem;
        font-family:var(--sans,'Plus Jakarta Sans',system-ui,sans-serif);
        font-size:.76rem;font-weight:500;color:var(--muted,#71717a);
        text-decoration:none;border:none;background:none;cursor:pointer;
        border-radius:5px;line-height:normal;
    }
    .wk-nav .dropdown a:hover,.wk-nav .dropdown button:hover{
        color:var(--fg,#0f0f0f);background:rgba(0,0,0,.04);
    }
    @media(max-width:600px){.wk-nav{margin:.75rem .75rem 0;width:auto}}
</style>
<nav class="wk-nav">
    <div class="nav-l"><a href="/" class="logo">writekit</a><span class="badge">beta</span><span class="version" id="wk-nav-version"></span></div>
    <div class="nav-r">
        <a href="/download">Download</a>
        <a href="/docs">Docs</a>
        <a href="/how-it-works">How it works</a>
        <a href="https://github.com/Macawls/writekit" target="_blank" rel="noopener" class="icon-link" aria-label="GitHub">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
        </a>
        <a href="/auth/login" class="signin" id="wk-signin">Sign in</a>
        <div class="profile" id="wk-profile">
            <div id="wk-avatar-wrap"></div>
            <div class="dropdown" id="wk-dropdown">
                <a id="wk-dash-link" href="#">Dashboard</a>
                <form method="POST" action="/auth/logout" style="margin:0">
                    <button type="submit">Sign out</button>
                </form>
            </div>
        </div>
    </div>
</nav>
<script>
(function(){
    var el=document.getElementById('wk-nav-version');
    if(!el)return;
    var cached=sessionStorage.getItem('wk_release_tag');
    if(cached)el.textContent=cached;
    fetch('https://api.github.com/repos/Macawls/writekit/releases/latest',{headers:{'Accept':'application/vnd.github+json'}})
        .then(function(r){return r.ok?r.json():null})
        .then(function(d){
            if(!d||!d.tag_name)return;
            sessionStorage.setItem('wk_release_tag',d.tag_name);
            sessionStorage.setItem('wk_release_data',JSON.stringify(d));
            el.textContent=d.tag_name;
        })
        .catch(function(){});
})();
(function(){
    if(!/logged_in=1/.test(document.cookie))return;

    function renderProfile(u){
        var wrap=document.getElementById('wk-avatar-wrap');
        if(wrap.children.length)return;
        if(u.avatar_url){
            var img=document.createElement('img');
            img.className='avatar';img.src=u.avatar_url;img.alt=u.name||'';
            wrap.appendChild(img);
        }else{
            var d=document.createElement('div');
            d.className='avatar-fallback';
            d.textContent=(u.name||'?')[0].toUpperCase();
            wrap.appendChild(d);
        }
        var h=location.host,proto=location.protocol;
        var parts=h.split(':'),host=parts[0],port=parts[1];
        var appHost='app.'+host+(port?':'+port:'');
        document.getElementById('wk-dash-link').href=proto+'//'+appHost;
        document.getElementById('wk-signin').style.display='none';
        var profile=document.getElementById('wk-profile');
        profile.style.display='block';
        var dd=document.getElementById('wk-dropdown');
        wrap.addEventListener('click',function(e){
            e.stopPropagation();dd.classList.toggle('open');
        });
        document.addEventListener('click',function(){dd.classList.remove('open')});
    }

    // Render immediately from cache to prevent flicker
    var cached=sessionStorage.getItem('wk_user');
    if(cached){try{renderProfile(JSON.parse(cached))}catch(e){}}

    // Fetch fresh data in background
    fetch('/auth/me',{credentials:'include'}).then(function(r){
        if(!r.ok){sessionStorage.removeItem('wk_user');return}
        return r.json();
    }).then(function(u){
        if(!u)return;
        sessionStorage.setItem('wk_user',JSON.stringify(u));
        renderProfile(u);
    });
})();
</script>
