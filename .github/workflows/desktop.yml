name: desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            suffix: windows-amd64.exe
            tags: ""
          - os: macos-latest
            platform: darwin/universal
            suffix: darwin-universal.app.zip
            tags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            suffix: linux-amd64
            tags: "webkit2_41"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        run: cd apps/user && bun install --frozen-lockfile

      - name: Build
        working-directory: desktop
        run: wails build -platform ${{ matrix.platform }} -clean ${{ matrix.tags && format('-tags {0}', matrix.tags) || '' }}

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        working-directory: desktop/build/bin
        run: zip -r WriteKit-${{ matrix.suffix }} WriteKit.app

      - uses: actions/upload-artifact@v4
        with:
          name: writekit-${{ matrix.suffix }}
          path: |
            desktop/build/bin/*.exe
            desktop/build/bin/*.zip
            desktop/build/bin/WriteKit
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "WriteKit $TAG" \
            --generate-notes \
            dist/*
