name: desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: WriteKit-Windows-x64.exe
            tags: ""
          - os: macos-latest
            platform: darwin/universal
            artifact: WriteKit-macOS-universal.zip
            tags: ""
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: WriteKit-Linux-x64
            tags: "webkit2_41"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        run: cd apps/user && bun install --frozen-lockfile

      - name: Build user SPA
        env:
          APP_VERSION: ${{ github.event.inputs.tag || github.ref_name }}
        run: cd apps/user && bun run build

      - name: Build
        working-directory: desktop
        run: wails build -platform ${{ matrix.platform }} -clean -trimpath -ldflags "-s -w" ${{ matrix.tags && format('-tags {0}', matrix.tags) || '' }}

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        working-directory: desktop/build/bin
        run: Rename-Item WriteKit.exe ${{ matrix.artifact }}
        shell: pwsh

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        working-directory: desktop/build/bin
        run: zip -r ${{ matrix.artifact }} WriteKit.app

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: desktop/build/bin
        run: mv WriteKit ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/build/bin/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "WriteKit $TAG" \
            --generate-notes \
            dist/*
