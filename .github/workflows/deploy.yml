name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/macawls/writekit

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: ver
        run: |
          sha=$(git rev-parse --short HEAD)
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "$sha")
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "ver=$tag" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ steps.ver.outputs.sha }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.ver }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        run: |
          curl -fsSL -X POST \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"${{ secrets.DOKPLOY_APP_ID }}"}' \
            "${{ secrets.DOKPLOY_URL }}/api/application.deploy"
