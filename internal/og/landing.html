<div style="display:flex;flex-direction:column;width:1200px;height:630px;background-color:#fafafa;font-family:'Plus Jakarta Sans',sans-serif;justify-content:space-between;padding:72px 80px;box-sizing:border-box;">

  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="display:flex;width:30px;height:30px;background-color:#0f0f0f;border-radius:8px;align-items:center;justify-content:center;">
        <div style="width:9px;height:9px;background-color:#fafafa;border-radius:2px;"></div>
      </div>
      <div style="font-size:20px;font-weight:700;color:#0f0f0f;letter-spacing:-0.02em;">WriteKit</div>
    </div>
    {{if .Eyebrow}}<div style="font-size:12px;font-weight:600;color:#a1a1aa;letter-spacing:0.16em;">{{.Eyebrow}}</div>{{end}}
  </div>

  <div style="display:flex;flex-direction:column;align-items:flex-start;">
    <div style="font-size:120px;font-weight:700;color:#0f0f0f;letter-spacing:-0.045em;line-height:0.95;width:1040px;">{{.Title}}</div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div style="font-size:18px;color:#71717a;letter-spacing:-0.005em;">{{.Domain}}</div>
    {{if .Tagline}}<div style="display:flex;align-items:center;gap:8px;">
      <div style="width:6px;height:6px;background-color:#22c55e;border-radius:3px;"></div>
      <div style="font-size:13px;color:#71717a;font-family:'JetBrains Mono',monospace;">{{.Tagline}}</div>
    </div>{{end}}
  </div>

</div>
